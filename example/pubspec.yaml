name: example
description: Demonstrates how to use the azure_stt_flutter plugin.
version: 1.0.0

publish_to: 'none'

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  azure_stt_flutter:
    path: ../
  
  provider: ^6.1.5+1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env